<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/ejercicio20.css">
    <title>Ejercicio 20</title>        
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Registro</h1>
            <p class="subtitle">Complete los datos</p>
            
            <form id="form-carga">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Ingrese un Nombre" required>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Ej: Diaz" required>
                </div>

                <div class="form-group">
                    <label for="lu">Libreta Universitaria</label>
                    <input type="number" max="999" min="99" id="lu" placeholder="Ej: APU999999" required>
                </div>

                <button type="submit" id="btn-procesar">Registrar Estudiante</button>
            </form>
        </section>

        <!-- Contenedor donde inyectaremos los resultados dinámicamente -->
        <section id="resultado" class="display-area"></section>
    </main>   
    
    <script type="module" src="/src/js/ejercicio20.js"></script>
</body>
</html>
